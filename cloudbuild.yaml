# Cloud Build CI/CD — triggers on push to main
# Substitutions (set in Cloud Build trigger config):
#   _REGION          e.g. us-central1
#   _PROJECT_ID      your GCP project ID
#   _GKE_CLUSTER     e.g. civilai-cluster
#   _NEXT_PUBLIC_SUPABASE_URL     (set in trigger secrets)
#   _NEXT_PUBLIC_SUPABASE_ANON_KEY
#   _NEXT_PUBLIC_API_URL          e.g. https://api.civilai.YOUR_DOMAIN.com

substitutions:
  _REGION: us-central1
  _GKE_CLUSTER: civilai-cluster
  _REPO: civilai

steps:
  # ── 1. Build backend image ───────────────────────────────────────────────────
  - name: "gcr.io/cloud-builders/docker"
    id: build-backend
    args:
      - build
      - -t
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/backend:${SHORT_SHA}"
      - -t
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/backend:latest"
      - ./backend
    waitFor: ["-"]

  # ── 2. Build frontend image ──────────────────────────────────────────────────
  - name: "gcr.io/cloud-builders/docker"
    id: build-frontend
    args:
      - build
      - -t
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/frontend:${SHORT_SHA}"
      - -t
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/frontend:latest"
      - --build-arg
      - "NEXT_PUBLIC_SUPABASE_URL=${_NEXT_PUBLIC_SUPABASE_URL}"
      - --build-arg
      - "NEXT_PUBLIC_SUPABASE_ANON_KEY=${_NEXT_PUBLIC_SUPABASE_ANON_KEY}"
      - --build-arg
      - "NEXT_PUBLIC_API_URL=${_NEXT_PUBLIC_API_URL}"
      - ./frontend
    waitFor: ["-"]

  # ── 3. Push both images ──────────────────────────────────────────────────────
  - name: "gcr.io/cloud-builders/docker"
    id: push-backend
    args:
      - push
      - "--all-tags"
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/backend"
    waitFor: ["build-backend"]

  - name: "gcr.io/cloud-builders/docker"
    id: push-frontend
    args:
      - push
      - "--all-tags"
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/frontend"
    waitFor: ["build-frontend"]

  # ── 4. Get GKE credentials ───────────────────────────────────────────────────
  - name: "gcr.io/cloud-builders/gcloud"
    id: get-credentials
    args:
      - container
      - clusters
      - get-credentials
      - "${_GKE_CLUSTER}"
      - --region
      - "${_REGION}"
      - --project
      - "${PROJECT_ID}"
    waitFor: ["push-backend", "push-frontend"]

  # ── 5. Deploy to GKE ─────────────────────────────────────────────────────────
  - name: "gcr.io/cloud-builders/kubectl"
    id: deploy-backend
    args:
      - set
      - image
      - deployment/backend
      - "backend=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/backend:${SHORT_SHA}"
      - -n
      - civilai
    env:
      - "CLOUDSDK_COMPUTE_REGION=${_REGION}"
      - "CLOUDSDK_CONTAINER_CLUSTER=${_GKE_CLUSTER}"
    waitFor: ["get-credentials"]

  - name: "gcr.io/cloud-builders/kubectl"
    id: deploy-frontend
    args:
      - set
      - image
      - deployment/frontend
      - "frontend=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/frontend:${SHORT_SHA}"
      - -n
      - civilai
    env:
      - "CLOUDSDK_COMPUTE_REGION=${_REGION}"
      - "CLOUDSDK_CONTAINER_CLUSTER=${_GKE_CLUSTER}"
    waitFor: ["get-credentials"]

  # ── 6. Verify rollout ────────────────────────────────────────────────────────
  - name: "gcr.io/cloud-builders/kubectl"
    args:
      - rollout
      - status
      - deployment/backend
      - deployment/frontend
      - -n
      - civilai
      - --timeout=300s
    env:
      - "CLOUDSDK_COMPUTE_REGION=${_REGION}"
      - "CLOUDSDK_CONTAINER_CLUSTER=${_GKE_CLUSTER}"
    waitFor: ["deploy-backend", "deploy-frontend"]

images:
  - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/backend:${SHORT_SHA}"
  - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/frontend:${SHORT_SHA}"

options:
  machineType: "E2_HIGHCPU_8"
  logging: CLOUD_LOGGING_ONLY

timeout: "1800s"
